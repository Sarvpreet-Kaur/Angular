<div class="employee-page">

    <div class="page-header">

        <div>

            <h1>Employees</h1>

            <p>
                Manage your workforce, assignments and employee information.
            </p>

        </div>

        <button class="add-btn" (click)="openAddForm()">

            <span>＋</span>

            Add Employee

        </button>

    </div>

    <div class="toolbar">

        <div class="search-container">

            <svg class="search-icon" viewBox="0 0 24 24" fill="none">

                <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2" />

                <path d="M20 20L17 17" stroke="currentColor" stroke-width="2" stroke-linecap="round" />

            </svg>

            <input type="text" placeholder="Search employees..." [value]="searchText" (input)="onSearch($event)">

        </div>

        <div class="stats">

            <div class="stat-card">

                <span>{{totalEmployees}}</span>

                <small>Total Employees</small>

            </div>

            <div class="stat-card">

                <span>{{activeEmployees}}</span>

                <small>Active</small>

            </div>

            <div class="stat-card">

                <span>{{onLeaveEmployees}}</span>

                <small>On Leave</small>

            </div>

        </div>

    </div>

    <div *ngIf="loading" class="loading-state">

        <div class="loader"></div>

        <p>Loading employees...</p>

    </div>

    <div *ngIf="!loading && filteredEmployees.length===0" class="empty-state">

        <h2>No Employees Found</h2>

        <p>
            Start by adding your first employee.
        </p>

        <button class="add-btn" (click)="openAddForm()">

            Add Employee

        </button>

    </div>

    <div class="employee-grid" *ngIf="!loading && filteredEmployees.length">

        <app-employee-card *ngFor="
                let employee of filteredEmployees;
                trackBy: trackByEmployee
            " [employee]="employee">
            <div class="employee-actions">

                <button class="card-btn view-btn" (click)="viewForm(employee)">

                    View

                </button>
                <button class="card-btn edit-btn" (click)="openEditForm(employee)">

                    Edit

                </button>

                <button class="card-btn delete-btn" (click)="deleteEmployee(employee)">

                    Delete

                </button>
            </div>

        </app-employee-card>

    </div>
    <app-employee-form [isOpen]="isFormOpen" [employee]="selectedEmployee" [projects]="projects" [mode]="formMode"
        (save)="saveEmployee($event)" (cancel)="closeForm()">

    </app-employee-form>

</div>

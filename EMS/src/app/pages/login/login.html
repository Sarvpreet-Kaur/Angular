<div class="login-page">
  <!-- Left Section -->
  <div class="left-panel">
    <div class="overlay">
      <h1>Employee Management System</h1>
      <p>
        Manage employees, departments, attendance,
        payroll and performance from one platform.
      </p>
      <div class="features">
        <div class="feature">
          <span>✔</span>
          <p>Employee Management</p>
        </div>
        <div class="feature">
          <span>✔</span>
          <p>Attendance Tracking</p>
        </div>
        <div class="feature">
          <span>✔</span>
          <p>Payroll Management</p>
        </div>
        <div class="feature">
          <span>✔</span>
          <p>Performance Reports</p>
        </div>
      </div>
    </div>
  </div>
  <!-- Right Section -->
  <div class="right-panel">
    <div class="login-card">
      <div class="logo">
        EMS
      </div>
      <h2>Welcome Back</h2>
      <p>Login to continue</p>
      <!-- Login Type -->
      <div class="role-selector">

        <button type="button" [class.active]="selectedRole === 'admin'"
          (click)="selectedRole='admin'">

          Admin

        </button>

        <button type="button" [class.active]="selectedRole === 'employee'"
          (click)="selectedRole='employee'">

          Employee

        </button>

      </div>
      <!-- Email -->
      <div class="form-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" [(ngModel)]="loginObj.userName" name="userName">
      </div>
      <!-- Password -->
      <div class="form-group">
        <label>Password</label>
        <div class="password-box">
          <input type="password" placeholder="Enter password" [(ngModel)]="loginObj.password" name="password">
          <span class="eye">
            👁
          </span>
        </div>
      </div>
      <div class="options">
        <label>
          <input type="checkbox">
          Remember Me
        </label>
        <a href="#">
          Forgot Password?
        </a>
      </div>
      <button class="login-btn" (click)="onLogin()">
        Login
      </button>
    </div>
  </div>
</div>

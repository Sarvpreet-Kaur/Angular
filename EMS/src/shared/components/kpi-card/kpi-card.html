<div class="kpi-card">

    <div class="gradient-circle"></div>

    <div class="card-header">

        <div class="icon-container">

            <ng-container [ngSwitch]="icon">

                <!-- Employees -->
                <svg *ngSwitchCase="'employees'" viewBox="0 0 24 24" class="icon">
                    <circle cx="9" cy="8" r="3" stroke="currentColor" stroke-width="2" fill="none"/>
                    <circle cx="17" cy="10" r="2.5" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M3 20C3 16.8 5.8 14 9 14C12.2 14 15 16.8 15 20"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"/>
                </svg>

                <!-- Projects -->
                <svg *ngSwitchCase="'projects'" viewBox="0 0 24 24" class="icon">
                    <rect x="3" y="3" width="7" height="7" stroke="currentColor" stroke-width="2" fill="none"/>
                    <rect x="14" y="3" width="7" height="7" stroke="currentColor" stroke-width="2" fill="none"/>
                    <rect x="14" y="14" width="7" height="7" stroke="currentColor" stroke-width="2" fill="none"/>
                    <path d="M10 6H14M17 10V14M10 17H14"
                        stroke="currentColor"
                        stroke-width="2"/>
                </svg>

                <!-- Active -->
                <svg *ngSwitchCase="'active'" viewBox="0 0 24 24" class="icon">
                    <circle cx="12" cy="12" r="9"
                        stroke="currentColor"
                        stroke-width="2"
                        fill="none"/>
                    <path d="M8 12L11 15L16 9"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"/>
                </svg>

                <!-- Leave -->
                <svg *ngSwitchCase="'leave'" viewBox="0 0 24 24" class="icon">
                    <rect x="4" y="5" width="16" height="15"
                        stroke="currentColor"
                        stroke-width="2"
                        fill="none"/>
                    <path d="M8 3V7M16 3V7M4 10H20"
                        stroke="currentColor"
                        stroke-width="2"/>
                </svg>

                <!-- Payroll -->
                <svg *ngSwitchCase="'payroll'" viewBox="0 0 24 24" class="icon">
                    <rect x="3" y="4" width="18" height="16"
                        stroke="currentColor"
                        stroke-width="2"
                        fill="none"/>
                    <path d="M7 12H17M12 8V16"
                        stroke="currentColor"
                        stroke-width="2"/>
                </svg>

            </ng-container>

        </div>

        <div
            class="trend"
            [class.positive]="trendPositive"
            [class.negative]="!trendPositive"
            *ngIf="trend">

            {{ trend }}

        </div>

    </div>

    <div class="content">

        <p class="title">{{ title }}</p>

        <h2>{{ value }}</h2>

        <span *ngIf="subtitle">
            {{ subtitle }}
        </span>

    </div>

</div>

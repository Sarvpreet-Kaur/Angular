<span
    class="priority-badge"
    [ngClass]="priority.toLowerCase()">

    <span class="indicator"></span>

    <svg
        class="priority-icon"
        viewBox="0 0 24 24"
        fill="none">

        <path
            d="M12 3L21 19H3L12 3Z"
            stroke="currentColor"
            stroke-width="2"
            stroke-linejoin="round"/>

        <path
            d="M12 9V13"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"/>

        <circle
            cx="12"
            cy="17"
            r="1"
            fill="currentColor"/>

    </svg>

    <span class="text">

        {{ priority }}

    </span>

</span>
